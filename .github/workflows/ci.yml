name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - run: golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - run: CGO_ENABLED=0 go test ./internal/... ./cmd/...

  agent-runner:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-runner
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - run: npm ci

      - run: npm run build

      - run: npm test

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - run: npm ci

      - run: npm run build

      - run: npm test
